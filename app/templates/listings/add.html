{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h2 class="mb-1">Add a New Place</h2>
        <p class="text-muted mb-4">Share a hidden gem with the community. Submissions are reviewed before going live.</p>

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" novalidate>
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title"
                               placeholder="e.g. Tintagel Castle" required>
                    </div>
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="" disabled selected>Choose a category&hellip;</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="5" placeholder="Describe what makes this place special…" required></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="photo" class="form-label">Photo <span class="text-muted fw-normal">(optional)</span></label>
                        <input type="file" class="form-control" id="photo" name="photo"
                               accept=".jpg,.jpeg,.png">
                        <div class="form-text">JPG or PNG &mdash; max 2&nbsp;MB.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Submit for Review</button>
                        <a href="{{ url_for('listings.index') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

        <p class="text-muted small mt-2">You'll earn <strong>5 points</strong> when you submit a listing!</p>
    </div>
</div>
{% endblock %}
